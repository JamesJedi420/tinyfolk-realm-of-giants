name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    name: Validate and test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rokit
        run: curl -sSf https://raw.githubusercontent.com/rojo-rbx/rokit/main/scripts/install.sh | bash

      - name: Install pinned toolchain
        run: rokit install

      - name: Add Rokit bin to PATH
        run: echo "$HOME/.rokit/bin" >> "$GITHUB_PATH"

      - name: Install luau-lsp
        run: |
          curl -sL "https://github.com/JohnnyMorganz/luau-lsp/releases/download/1.68.0/luau-lsp-x86_64-unknown-linux.zip" -o /tmp/luau-lsp.zip
          unzip -o /tmp/luau-lsp.zip -d /tmp/luau-lsp
          chmod +x /tmp/luau-lsp/luau-lsp
          echo "/tmp/luau-lsp" >> "$GITHUB_PATH"

      - name: Regenerate sourcemap
        run: rojo sourcemap default.project.json -o sourcemap.json

      - name: Validate (StyLua, Selene, luau-lsp)
        run: bash scripts/run-validation.sh

      - name: Run Lune specs
        run: bash scripts/run-tests.sh
